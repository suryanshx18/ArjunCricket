<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Cricket Live</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Montserrat;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
.header{
  font-family:"Bebas Neue";
  font-size:40px;
  text-align:center;
  padding:15px;
  color:#ff1e1e;
  letter-spacing:3px;
}

/* SUB TEXT */
.sub{
  text-align:center;
  color:#aaa;
  margin-top:-10px;
  font-size:13px;
}

/* HOME GRID */
.container{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:20px;
  max-width:500px;
  margin:auto;
}

/* BUTTONS */
.btn{
  display:block;
  padding:14px;
  text-align:center;
  background:linear-gradient(135deg,#ff1e1e,#b30000);
  color:white;
  font-weight:600;
  border-radius:12px;
  text-decoration:none;
  box-shadow:0 0 12px rgba(255,0,0,0.3);
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.03);
}

/* TELEGRAM */
.telegram{
  margin:20px;
  text-align:center;
}

.telegram a{
  background:#0088cc;
  padding:10px 18px;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* PLAYER */
#playerPage{
  display:none;
}

iframe{
  width:100%;
  height:70vh;
  border:none;
}

/* TOP BAR PLAYER */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
  font-weight:600;
}

/* ERROR */
#error{
  display:none;
  text-align:center;
  padding:40px;
  color:red;
}
</style>
</head>

<body>

<!-- HOME PAGE -->
<div id="home">

  <div class="header">ARJUN CRICKET LIVE</div>
  <div class="sub">Fast • Free • Live Streaming Links</div>

  <div class="container">

    <a class="btn" href="?id=hindi">🔥 Star Sports Hindi</a>
    <a class="btn" href="?id=jio-hotstar">⚡ Jio Hotstar</a>
    <a class="btn" href="?id=eng">🏏 Star English</a>
    <a class="btn" href="?id=sky-sports-nz">🌍 Sky 4K</a>
    <a class="btn" href="?id=willow">📺 Willow Sports</a>
    <a class="btn" href="?id=ios">🍎 For iOS Users</a>

  </div>

  <div class="telegram">
    <a href="https://t.me/ArjunCricket18" target="_blank">Join Telegram</a>
  </div>

</div>

<!-- PLAYER PAGE -->
<div id="playerPage">

  <div class="topbar">
    <div>🏏 ARJUN CRICKET LIVE</div>
    <a href="/" style="color:#ff1e1e;text-decoration:none;">Home</a>
  </div>

  <iframe id="player"></iframe>

  <div class="telegram">
    <a href="https://t.me/ArjunCricket18" target="_blank">Join Telegram</a>
  </div>

</div>

<!-- ERROR -->
<div id="error">
  <h2>Stream Not Found</h2>
  <p>Invalid or missing link</p>
  <a href="/" style="color:white">Go Back</a>
</div>

<script>

const JSON_URL = "https://allrounderid2.pages.dev/id.json";

const id = new URLSearchParams(location.search).get("id");

/* IF NO ID → SHOW HOME */
if(!id){
  document.getElementById("home").style.display="block";
}

/* IF ID EXISTS → LOAD PLAYER */
else{
  loadStream();
}

async function loadStream(){

  try{

    const res = await fetch(JSON_URL);
    const data = await res.json();

    const stream = data.iframes.find(x => x.id === id);

    if(!stream){
      document.getElementById("home").style.display="none";
      document.getElementById("error").style.display="block";
      return;
    }

    document.getElementById("home").style.display="none";
    document.getElementById("playerPage").style.display="block";

    document.getElementById("player").src = stream.iframeSrc;

  }catch(e){
    document.getElementById("error").style.display="block";
  }

}

</script>

</body>
</html>
