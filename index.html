<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Cricket</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f0c;
  color:white;
}

/* HEADER */
.header{
  background:#00c853;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

/* HOME */
#home{
  padding:15px;
}

.card{
  background:#121a14;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #1f2a22;
}

.card a{
  color:#00e676;
  text-decoration:none;
  font-weight:bold;
}

/* PLAYER */
#playerPage{
  display:none;
  height:100vh;
  flex-direction:column;
}

.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:10;
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,0,0,0.5);
}

iframe{
  flex:1;
  width:100%;
  border:none;
  height:100vh;
}

.btn{
  background:transparent;
  border:1px solid white;
  color:white;
  padding:4px 8px;
  border-radius:6px;
}

.footer{
  text-align:center;
  padding:12px;
  color:#00e676;
  border-top:1px solid #222;
}

/* ERROR */
#error{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  color:white;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
</style>
</head>

<body>

<div class="header">
🏏 ARJUN CRICKET LIVE
</div>

<!-- HOME -->
<div id="home">

  <div class="card"><a href="?id=hindi">Star Sports Hindi</a></div>
  <div class="card"><a href="?id=jio-hotstar">Jio Hotstar</a></div>
  <div class="card"><a href="?id=eng">Star English</a></div>
  <div class="card"><a href="?id=sky-sports-nz">Sky 4K</a></div>
  <div class="card"><a href="?id=willow">Willow Sports</a></div>
  <div class="card"><a href="?id=ios">For iOS Users</a></div>

</div>

<!-- PLAYER -->
<div id="playerPage">

  <div class="topbar">
    <div>ARJUN CRICKET</div>
    <button class="btn" onclick="toggleFullscreen()">⛶</button>
  </div>

  <iframe id="player"></iframe>

  <div class="footer">🔴 LIVE LINKS BY ARJUN CRICKET</div>

</div>

<!-- ERROR -->
<div id="error">
  <h1 style="color:red;">Stream Error</h1>
  <p id="msg"></p>
  <button onclick="location.href='/'">Home</button>
</div>

<script>

const JSON_URL = "https://allrounderid2.pages.dev/id.json";

/* CHECK MODE */
const id = new URLSearchParams(location.search).get("id");

if(!id){
  document.getElementById("home").style.display="block";
  document.getElementById("playerPage").style.display="none";
} else {
  loadStream(id);
}

/* LOAD STREAM */
async function loadStream(id){

  document.getElementById("home").style.display="none";
  document.getElementById("playerPage").style.display="flex";

  try{
    const res = await fetch(JSON_URL);
    const data = await res.json();

    const stream = data.iframes.find(x => x.id === id);

    if(!stream){
      showError("Invalid stream ID");
      return;
    }

    document.getElementById("player").src = stream.iframeSrc;

  } catch(e){
    showError("Failed to load stream");
  }
}

/* ERROR */
function showError(msg){
  document.getElementById("playerPage").style.display="none";
  document.getElementById("home").style.display="none";
  document.getElementById("error").style.display="flex";
  document.getElementById("msg").innerText=msg;
}

/* FULLSCREEN */
function toggleFullscreen(){
  const el = document.getElementById("playerPage");

  if(!document.fullscreenElement){
    el.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

</script>

</body>
</html>
