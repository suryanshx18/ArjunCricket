<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Cricket — Live</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f0c;
    color: white;
  }

  .topbar {
    padding: 12px;
    background: #00c853;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
  }

  iframe {
    width: 100%;
    height: 60vh;
    border: none;
    background: black;
  }

  .credit {
    text-align: center;
    padding: 10px;
    color: #00e676;
    font-weight: bold;
    border-top: 1px solid #222;
  }

  /* ERROR SCREEN */
  #error {
    display: none;
    height: 100vh;
    background: #000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }

  #error h1 {
    color: red;
  }

  button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    background: #00c853;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="topbar">
  <div>ARJUN CRICKET</div>
  <div>LIVE</div>
</div>

<!-- PLAYER -->
<iframe id="player"></iframe>

<!-- CREDIT -->
<div class="credit">
  🔴 LIVE LINKS BY ARJUN CRICKET
</div>

<!-- ERROR SCREEN -->
<div id="error">
  <h1>Stream Not Available</h1>
  <p id="msg"></p>
  <button onclick="location.reload()">Retry</button>
</div>

<script>
const JSON_URL = "https://allrounderid2.pages.dev/id.json";

async function loadStream() {

  const id = new URLSearchParams(location.search).get("id");

  // ❌ NO ID PROVIDED
  if (!id) {
    showError("No ID provided in URL");
    return;
  }

  try {
    const res = await fetch(JSON_URL);
    const data = await res.json();

    const stream = data.iframes.find(x => x.id === id);

    // ❌ WRONG ID
    if (!stream || !stream.iframeSrc) {
      showError("Invalid stream ID");
      return;
    }

    // ✅ LOAD STREAM
    document.getElementById("player").src = stream.iframeSrc;

  } catch (e) {
    showError("Failed to load data");
  }
}

function showError(msg) {
  document.getElementById("player").style.display = "none";
  document.getElementById("error").style.display = "flex";
  document.getElementById("msg").innerText = msg;
}

loadStream();
</script>

</body>
</html>
