<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Cricket — Live</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Arial, sans-serif;
}

/* PLAYER WRAPPER */
#playerWrapper {
  position: relative;
  height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
  color: white;
  font-weight: bold;
}

/* FULLSCREEN BUTTON */
.full-btn {
  background: transparent;
  border: 1px solid white;
  color: white;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
}

/* IFRAME */
iframe {
  flex: 1;
  width: 100%;
  height: 100%;
  border: none;
  background: black;
}

/* LIVE FOOTER */
.credit {
  text-align: center;
  padding: 10px;
  color: #00e676;
  font-weight: bold;
  border-top: 1px solid #222;
  background: rgba(0,0,0,0.8);
}

/* ERROR SCREEN */
#error {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

#error h1 {
  color: red;
}
</style>
</head>

<body>

<!-- PLAYER -->
<div id="playerWrapper">

  <div class="topbar">
    <div>🏏 ARJUN CRICKET</div>

    <div>
      LIVE
      <button class="full-btn" onclick="toggleFullscreen()">⛶</button>
    </div>
  </div>

  <iframe id="player"></iframe>

</div>

<!-- FOOTER -->
<div class="credit">
  🔴 LIVE LINKS BY ARJUN CRICKET
</div>

<!-- ERROR -->
<div id="error">
  <h1>Stream Not Available</h1>
  <p id="msg"></p>
  <button onclick="location.reload()">Retry</button>
</div>

<script>

const JSON_URL = "https://allrounderid2.pages.dev/id.json";

/* LOAD STREAM */
async function loadStream() {

  const id = new URLSearchParams(location.search).get("id");

  // NO ID
  if (!id) {
    showError("No ID provided in URL");
    return;
  }

  try {
    const res = await fetch(JSON_URL);
    const data = await res.json();

    const stream = data.iframes.find(x => x.id === id);

    // WRONG ID
    if (!stream || !stream.iframeSrc) {
      showError("Invalid stream ID");
      return;
    }

    document.getElementById("player").src = stream.iframeSrc;

  } catch (e) {
    showError("Failed to load stream data");
  }
}

/* ERROR */
function showError(msg) {
  document.getElementById("playerWrapper").style.display = "none";
  document.getElementById("error").style.display = "flex";
  document.getElementById("msg").innerText = msg;
}

/* FULLSCREEN */
function toggleFullscreen() {
  const elem = document.getElementById("playerWrapper");

  if (!document.fullscreenElement) {
    elem.requestFullscreen().catch(() => {
      alert("Fullscreen not supported");
    });
  } else {
    document.exitFullscreen();
  }
}

loadStream();

</script>

</body>
</html>
