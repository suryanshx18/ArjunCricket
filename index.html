<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Arjun Cricket — Live</title>

  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #00c853;
      --green-glow: rgba(0,200,83,0.35);
      --dark: #070709;
      --card: #0e0e12;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* LOADING */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      background: var(--dark);
      z-index: 9999;
    }

    .load-logo {
      font-family: 'Bebas Neue';
      font-size: 48px;
      letter-spacing: 6px;
      animation: pulse 1.5s infinite;
    }

    .load-logo span { color: var(--green); }

    @keyframes pulse {
      50% { opacity: 0.5; }
    }

    /* TOP BAR */
    .topbar {
      position: absolute;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 12px 18px;
      z-index: 10;
    }

    .brand {
      font-family: 'Bebas Neue';
      font-size: 22px;
      letter-spacing: 3px;
    }

    .brand span { color: var(--green); }

    .live-pill {
      background: var(--green);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    /* VIDEO */
    .video-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* NEW SECTION */
    .live-credit {
      text-align: center;
      padding: 14px;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: 600;
      color: var(--green);
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
    }

    /* BOTTOM PANEL */
    .bottom-panel {
      padding: 16px;
    }

    .tg-btn {
      display: block;
      text-align: center;
      padding: 12px;
      background: var(--green);
      color: black;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 10px;
    }

    /* ERROR */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--dark);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="loading-screen">
  <div class="load-logo">ARJUN<span>CRICKET</span></div>
</div>

<div id="error-screen">
  <h2>Stream Offline</h2>
  <p>Stream not available</p>
</div>

<div class="video-wrap">
  <div class="topbar">
    <div class="brand">ARJUN<span>CRICKET</span></div>
    <div class="live-pill">LIVE</div>
  </div>

  <iframe id="main-iframe"></iframe>
</div>

<!-- NEW REQUIRED TEXT -->
<div class="live-credit">
  🔴 LIVE LINKS BY ARJUN CRICKET
</div>

<div class="bottom-panel">
  <a class="tg-btn" href="https://t.me/ArjunCricket18" target="_blank">
    Join Telegram
  </a>
</div>

<script>
const JSON_URL = "https://allrounderid2.pages.dev/id.json";

window.onload = () => {
  loadStream();
};

async function loadStream() {
  const id = new URLSearchParams(location.search).get("id");
  if (!id) return;

  const res = await fetch(JSON_URL);
  const data = await res.json();

  const stream = data.iframes.find(x => x.id === id);
  if (!stream) return;

  document.getElementById("main-iframe").src = stream.iframeSrc;

  document.getElementById("loading-screen").style.display = "none";
}
</script>

</body>
</html>
