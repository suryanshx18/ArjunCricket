<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification - Arjun Cricket</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#0b1020;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:42px 42px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#304ffe55 0%,transparent 70%);
    top:-150px;
    left:50%;
    transform:translateX(-50%);
    filter:blur(40px);
}

.card{
    position:relative;
    z-index:10;
    width:440px;
    background:#171d2d;
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    padding:35px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
}

.logo{
    width:72px;
    height:72px;
    border-radius:18px;
    background:#fff;
    color:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    font-weight:bold;
    margin:auto;
}

h1{
    margin-top:18px;
    font-size:38px;
}

.subtitle{
    color:#9eb0cb;
    margin-top:8px;
}

.badge{
    display:inline-block;
    margin-top:25px;
    background:#133226;
    color:#56f29a;
    padding:8px 16px;
    border-radius:30px;
    font-size:14px;
}

.verify{
    margin-top:28px;
    font-size:28px;
    font-weight:bold;
}

.desc{
    color:#8e9db5;
    margin:15px 0 30px;
    line-height:1.5;
}

.cf-turnstile{
    display:flex;
    justify-content:center;
}

.status{
    margin-top:20px;
    color:#91a3bf;
}

.footer{
    margin-top:25px;
    color:#6f819e;
    font-size:13px;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">A</div>

<h1>Arjun Cricket</h1>

<div class="subtitle">Secure Access Gateway</div>

<div class="badge">Protected Session</div>

<div class="verify">Verify you are human</div>

<div class="desc">
This quick security check helps protect Arjun Cricket resources from automated abuse.
</div>

<div
class="cf-turnstile"
data-sitekey="0x4AAAAAADugsTPQXttXx1Eg"
data-theme="dark"
data-callback="verified">
</div>

<div class="status" id="status">
Waiting for verification...
</div>

<div class="footer">
Protected by Cloudflare Turnstile
</div>

</div>

<script>
function verified(token){

    document.getElementById("status").innerHTML =
        "✅ Verification successful. Redirecting...";

    setTimeout(function(){

        window.location.href="index.html";

    },1000);

}
</script>

</body>
</html>
